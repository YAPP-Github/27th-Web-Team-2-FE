pre-commit:
  commands:
    lint-staged:
      run: |
        [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh"
        npm run lint-staged

pre-push:
  commands:
    typecheck:
      run: |
        [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh"
        npm run typecheck

commit-msg:
  commands:
    commitlint:
      run: |
        [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh"
        npm run commitlint -- --edit {1}
